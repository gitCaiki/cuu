<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>bucetao</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(135deg,#ffd6e8,#ffeecf);
    padding:20px;
}

.container{
    text-align:center;
    width:100%;
    max-width:500px;
    position:relative;
}

h1{
    font-size:34px;
    margin-bottom:20px;
    color:#ff3b7f;
    line-height:1.4;
}

.image-container{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom:30px;
}

#mariaFoto{
    width:200px;
    height:200px;
    object-fit:cover;
    border-radius:50%;
    border:5px solid #ff3b7f;
}

.arrow{
    font-size:50px;
    animation:point 0.5s ease-in-out infinite alternate;
}

.arrow-left{
    animation-delay:0s;
}

.arrow-right{
    animation-delay:0.1s;
}

.arrow-top{
    position:absolute;
    top:220px;
    left:50%;
    transform:translateX(-50%);
    animation-delay:0.2s;
}

@keyframes point{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(10px);
    }
}

.arrow-top{
    animation:pointDown 0.5s ease-in-out infinite alternate;
}

@keyframes pointDown{
    from{
        transform:translateX(-50%) translateY(0);
    }
    to{
        transform:translateX(-50%) translateY(10px);
    }
}

button{
    padding:18px 40px;
    margin:10px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    font-size:22px;
    transition:.15s;
}

#sim{
    background:#4CAF50;
    color:white;
}

#sim:hover{
    transform:scale(1.1);
}

#nao{
    background:#ff4d4d;
    color:white;
}

.mensagem-nao{
    position:absolute;
    inset:0;
    background:#ff3b7f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:150px;
    font-weight:bold;
    animation:fadeIn 0.3s ease-in;
    z-index:1000;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:scale(0.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

#mensagem{
    display:none;
    position:absolute;
    inset:0;
    background:white;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-size:55px;
    color:#ff4d88;
    overflow:hidden;
    padding:20px;
    text-align:center;
}

#mensagem h1{
    font-size:70px;
    margin-bottom:20px;
}

#mensagem h2{
    font-size:30px;
}

.pet{
    position:absolute;
    font-size:50px;
    animation:pet 8s linear infinite;
}

@keyframes pet{
    from{
        transform:translateY(120vh) rotate(0deg);
    }
    to{
        transform:translateY(-120vh) rotate(360deg);
    }
}

.confete{
    position:absolute;
    width:12px;
    height:12px;
    animation:confete 4s linear forwards;
}

@keyframes confete{
    from{
        transform:translateY(-20px) rotate(0);
    }
    to{
        transform:translateY(110vh) rotate(900deg);
    }
}

/* Responsividade para celulares */
@media (max-width: 600px){
    h1{
        font-size:24px;
        margin-bottom:20px;
    }

    #mariaFoto{
        width:150px;
        height:150px;
    }

    .arrow{
        font-size:40px;
    }

    .arrow-top{
        top:180px;
    }

    button{
        padding:15px 30px;
        font-size:18px;
    }

    #mensagem h1{
        font-size:40px;
    }

    #mensagem h2{
        font-size:20px;
    }

    #gatoPalmas{
        width:150px !important;
        bottom:10px !important;
        right:10px !important;
    }

    .mensagem-nao{
        font-size:60px;
    }
}
</style>

</head>
<body>

<div class="container">

<h1>
Maria,<br><br>
aceita ir para São Paulo cmg passar seus <b><p>PIORES</p></b> dias?
</h1>

<div class="image-container">
    <div class="arrow arrow-left">👉</div>
    <img id="mariaFoto" src="Captura de tela 2026-06-29 011020.png" alt="Maria">
    <div class="arrow arrow-right">👈</div>
</div>
<div class="arrow arrow-top">👇</div>

<button id="sim">Sim ❤️</button>
<button id="nao">Não 😠</button>

</div>

<div id="mensagem">
<h1 style="font-size:70px;">🎉 BORAAAA!!!!🎉</h1>
<h2>COMPRANDO AS PASSAGENS😎</h2>
<img id="gatoPalmas" src="https://media.tenor.com/xPqP_pw_RucAAAAC/gato-batendo-palmas.gif" style="position:absolute; bottom:20px; right:80px; width:300px; border-radius:15px; display:none;">
</div>

<script>

const btnNao=document.getElementById("nao");
const btnSim=document.getElementById("sim");
const tela=document.getElementById("mensagem");

btnNao.addEventListener("click", function(){
    // Create big "SEU CU" message
    const mensagem = document.createElement("div");
    mensagem.className = "mensagem-nao";
    mensagem.textContent = "SEU CU";
    document.body.appendChild(mensagem);
    
    // Wait 5 seconds and then go back with only Sim button
    setTimeout(function(){
        mensagem.remove();
        btnNao.style.display = "none";
    }, 3000);
});

btnSim.onclick=function(){

    document.querySelector(".container").style.display="none";
    tela.style.display="flex";
    document.getElementById("gatoPalmas").style.display="block";

    criarConfetes();
    criarPets();

}

function criarConfetes(){

    const cores=[
        "#ff0000",
        "#00ff00",
        "#0099ff",
        "#ffff00",
        "#ff00ff",
        "#00ffff",
        "#ff8800"
    ];

    for(let i=0;i<250;i++){

        let c=document.createElement("div");

        c.className="confete";

        c.style.left=Math.random()*100+"vw";

        c.style.background=
        cores[Math.floor(Math.random()*cores.length)];

        c.style.animationDelay=Math.random()*2+"s";

        c.style.transform=
        "rotate("+Math.random()*360+"deg)";

        tela.appendChild(c);

    }

}

function criarPets(){

    const emojis=["🖕","🖕","🖕","🖕","🖕","🖕","🖕"];

    for(let i=0;i<70;i++){

        let pet=document.createElement("div");

        pet.className="pet";

        pet.innerHTML=
        emojis[Math.floor(Math.random()*emojis.length)];

        pet.style.left=Math.random()*100+"vw";

        pet.style.animationDelay=Math.random()*6+"s";

        pet.style.fontSize=(30+Math.random()*50)+"px";

        tela.appendChild(pet);

    }

}

</script>

</body>
</html>
