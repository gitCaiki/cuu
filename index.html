<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Convite Especial ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(135deg,#ffd6e8,#ffeecf);
}

.container{
    text-align:center;
}

h1{
    font-size:34px;
    margin-bottom:40px;
    color:#ff3b7f;
}

button{
    padding:18px 40px;
    margin:10px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    font-size:22px;
    transition:.15s;
}

#sim{
    background:#4CAF50;
    color:white;
}

#sim:hover{
    transform:scale(1.1);
}

#nao{
    background:#ff4d4d;
    color:white;
    position:absolute;
}

#mensagem{
    display:none;
    position:absolute;
    inset:0;
    background:white;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-size:55px;
    color:#ff4d88;
    overflow:hidden;
}

.pet{
    position:absolute;
    font-size:50px;
    animation:pet 8s linear infinite;
}

@keyframes pet{
    from{
        transform:translateY(120vh) rotate(0deg);
    }
    to{
        transform:translateY(-120vh) rotate(360deg);
    }
}

.confete{
    position:absolute;
    width:12px;
    height:12px;
    animation:confete 4s linear forwards;
}

@keyframes confete{
    from{
        transform:translateY(-20px) rotate(0);
    }
    to{
        transform:translateY(110vh) rotate(900deg);
    }
}
</style>

</head>
<body>

<div class="container">

<h1>
Maria,<br><br>
aceita ir para São Paulo cmg passar seus <b><p>PIORES</p></b> dias?
</h1>

<button id="sim">Sim ❤️</button>
<button id="nao">Não 😠</button>

</div>

<div id="mensagem">
<h1 style="font-size:70px;">🎉 BORAAAA!!!!🎉</h1>
<h2>COMPRANDO AS PASSAGENS😎</h2>
<img id="gatoPalmas" src="https://media.tenor.com/xPqP_pw_RucAAAAC/gato-batendo-palmas.gif" style="position:absolute; bottom:20px; right:80px; width:300px; border-radius:15px; display:none;">
</div>

<script>

const btnNao=document.getElementById("nao");
const btnSim=document.getElementById("sim");
const tela=document.getElementById("mensagem");

btnNao.style.left="55%";
btnNao.style.top="58%";

btnNao.addEventListener("mouseover",fugir);
btnNao.addEventListener("click",fugir);

function fugir(){

    const largura=window.innerWidth-150;
    const altura=window.innerHeight-80;

    const x=Math.random()*largura;
    const y=Math.random()*altura;

    btnNao.style.left=x+"px";
    btnNao.style.top=y+"px";
}

btnSim.onclick=function(){

    document.querySelector(".container").style.display="none";
    tela.style.display="flex";
    document.getElementById("gatoPalmas").style.display="block";

    criarConfetes();
    criarPets();

}

function criarConfetes(){

    const cores=[
        "#ff0000",
        "#00ff00",
        "#0099ff",
        "#ffff00",
        "#ff00ff",
        "#00ffff",
        "#ff8800"
    ];

    for(let i=0;i<250;i++){

        let c=document.createElement("div");

        c.className="confete";

        c.style.left=Math.random()*100+"vw";

        c.style.background=
        cores[Math.floor(Math.random()*cores.length)];

        c.style.animationDelay=Math.random()*2+"s";

        c.style.transform=
        "rotate("+Math.random()*360+"deg)";

        tela.appendChild(c);

    }

}

function criarPets(){

    const emojis=["🖕","🖕","🖕","🖕","🖕","🖕","🖕"];

    for(let i=0;i<70;i++){

        let pet=document.createElement("div");

        pet.className="pet";

        pet.innerHTML=
        emojis[Math.floor(Math.random()*emojis.length)];

        pet.style.left=Math.random()*100+"vw";

        pet.style.animationDelay=Math.random()*6+"s";

        pet.style.fontSize=(30+Math.random()*50)+"px";

        tela.appendChild(pet);

    }

}

</script>

</body>
</html>
